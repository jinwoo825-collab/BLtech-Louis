<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 업무 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🗂️ 나의 업무 관리 <span id="today-date" class="today-date"></span></div>
    <div class="top-actions">
      <label class="toggle"><input type="checkbox" id="chk-hide-done" /> 완료 숨기기</label>
      <button id="btn-export" class="btn ghost small">⬇ 백업</button>
      <button id="btn-import" class="btn ghost small">⬆ 복원</button>
      <input type="file" id="file-import" accept="application/json" hidden />
    </div>
  </header>

  <div id="summary" class="summary"></div>
  <main id="board" class="board"></main>

  <!-- 항목 편집 모달 -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <h3>항목 편집</h3>
      <label class="field">
        <span>내용</span>
        <input id="f-title" type="text" placeholder="할 일 내용" />
      </label>
      <label class="field">
        <span>메모</span>
        <textarea id="f-note" rows="3" placeholder="상세 메모 (선택)"></textarea>
      </label>
      <div class="field-row">
        <label class="field">
          <span>분류</span>
          <select id="f-cat"></select>
        </label>
        <label class="field">
          <span>우선순위</span>
          <select id="f-priority">
            <option value="high">높음</option>
            <option value="normal">보통</option>
            <option value="low">낮음</option>
          </select>
        </label>
      </div>
      <div class="field-row">
        <label class="field">
          <span>날짜</span>
          <input id="f-due" type="date" />
        </label>
        <label class="field check">
          <span>완료 여부</span>
          <span class="check-line"><input id="f-done" type="checkbox" /> 완료됨</span>
        </label>
      </div>
      <div class="modal-actions">
        <button id="f-delete" class="btn danger small">삭제</button>
        <span class="spacer"></span>
        <button id="f-cancel" class="btn ghost small">취소</button>
        <button id="f-save" class="btn primary small">저장</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
